    { nick: "Lupo Frullo", nome: "Matteo Gragnani", anni: "12", tel: "3756238580", note: "In famiglia pratichiamo educazione/istruzione parentale ad indirizzo montessoriano da quando Matteo è nato. Per questo non utilizziamo né premi né punizioni. Ci sono 3 regole in casa che non si discutono: non si può fare male. farsi male e danneggiare (fare male) alle cose (ambiente). Sono tre limiti invalicabili. Per il resto le regole vengono condivise e negoziate con il bambino attraverso il dialogo. Il bambino ha sempre imparato attraverso il fare: l’uso delle mani e del corpo sono centrali nella nostra visione dell’apprendimento. Matteo è un bambino sensibile. Preferisce osservare bene le nuove situazioni prima di aprirsi e dare confidenza.  Abitiamo in campagna - abbiamo un bosco - un oliveto (da recuperare) - 4 gatti 6 galline 1 gallo 1 cane e 1 tartaruga. Cerchiamo di imparare ad avere un nostro orto anche se per anni abbiamo partecipato a progetti di orti condivisi con altre famiglie. A Matteo piace molto leggere e cucinare e ha ideato un suo giornalino dedicato al paese in cui viviamo da una paio di anni: Il Gazzettino Nocchiese. Dallo scorso anno è scoppiata una passione infinita per il tennis. Gli piace l’idea di imparare a conoscere il bosco. Gli piace imparare a riconoscere le piante spontanee e per noi(che amiamo tanto la natura) sarebbe bello dargli l’opportunità di familiarizzare con la biodiversità che caratterizza la Lecciona.Speriamo che la diversa impostazione educativa non sia d’ostacolo. Non pensiamo che sia necessario trattare duramente i bambini per prepararli al fatto che la vita è dura. Ma crediamo che la consapevolezza che può  offrire la natura sia una risorsa davvero preziosa perché dalla natura abbiamo davvero tanto da imparare. Quindi ci apriamo a questa esperienza che valuteremo passo passo anche insieme a voi.", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Raggio di sole", nome: "Filippo Albiani", anni: "7", tel: "3358036181", note: "", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Serpente Infuocato ", nome: "Saverio Fisichella", anni: "10", tel: "3461031199", note: "", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Pino", nome: "Adam Meirson", anni: "9", tel: "3717702520", note: "Trovo che Adam sia un po’ pigro; non ama fare sforzi che non percepisce come obbligatori. I doveri li svolge velocemente ed efficientemente ma sempre solo per liberarsene. Quando torna a casa vuole subito stare sul suo tablet e c’è un gioco chiamato Steal a Brainrot che ha preso molto spazio nella sua mente e nella sua attenzione.Gli piace mangiare soprattutto zucchero e farina bianca anche se ne è consapevole. Si concede un po “scappatoie”. Le cose che dico sono in senso generale. non è tutto bianco o nero però c’è in lui una parte molto infantile anche molto ingenua dolce affettuosa e di buon cuore che in molti aspetti dei “doveri della vita” non è ancora molto matura.", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
  ],

    { nick: "Lupo Frullo", nome: "Matteo Gragnani", anni: "12", tel: "3756238580", note: "In famiglia pratichiamo educazione/istruzione parentale ad indirizzo montessoriano da quando Matteo è nato. Per questo non utilizziamo né premi né punizioni. Ci sono 3 regole in casa che non si discutono: non si può fare male. farsi male e danneggiare (fare male) alle cose (ambiente). Sono tre limiti invalicabili. Per il resto le regole vengono condivise e negoziate con il bambino attraverso il dialogo. Il bambino ha sempre imparato attraverso il fare: l’uso delle mani e del corpo sono centrali nella nostra visione dell’apprendimento. Matteo è un bambino sensibile. Preferisce osservare bene le nuove situazioni prima di aprirsi e dare confidenza.  Abitiamo in campagna - abbiamo un bosco - un oliveto (da recuperare) - 4 gatti 6 galline 1 gallo 1 cane e 1 tartaruga. Cerchiamo di imparare ad avere un nostro orto anche se per anni abbiamo partecipato a progetti di orti condivisi con altre famiglie. A Matteo piace molto leggere e cucinare e ha ideato un suo giornalino dedicato al paese in cui viviamo da una paio di anni: Il Gazzettino Nocchiese. Dallo scorso anno è scoppiata una passione infinita per il tennis. Gli piace l’idea di imparare a conoscere il bosco. Gli piace imparare a riconoscere le piante spontanee e per noi(che amiamo tanto la natura) sarebbe bello dargli l’opportunità di familiarizzare con la biodiversità che caratterizza la Lecciona.Speriamo che la diversa impostazione educativa non sia d’ostacolo. Non pensiamo che sia necessario trattare duramente i bambini per prepararli al fatto che la vita è dura. Ma crediamo che la consapevolezza che può  offrire la natura sia una risorsa davvero preziosa perché dalla natura abbiamo davvero tanto da imparare. Quindi ci apriamo a questa esperienza che valuteremo passo passo anche insieme a voi.", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Prusik", nome: "Matteo Biagi", anni: "12", tel: "3492919896", note: "Matteo e’ un bambino con diagnosi di Dsa (disturbo di apprendimento). durante l’ultimo anno scolastico il bambino e’ stato vittima di percosse ed esclusione da parte di alcuni compagni percui abbiamo intrapreso un percorso psicologico che è tuttora in corso", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Serpente Infuocato ", nome: "Saverio Fisichella", anni: "10", tel: "3461031199", note: "", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Pino", nome: "Adam Meirson", anni: "9", tel: "3717702520", note: "Trovo che Adam sia un po’ pigro; non ama fare sforzi che non percepisce come obbligatori. I doveri li svolge velocemente ed efficientemente ma sempre solo per liberarsene. Quando torna a casa vuole subito stare sul suo tablet e c’è un gioco chiamato Steal a Brainrot che ha preso molto spazio nella sua mente e nella sua attenzione.Gli piace mangiare soprattutto zucchero e farina bianca anche se ne è consapevole. Si concede un po “scappatoie”. Le cose che dico sono in senso generale. non è tutto bianco o nero però c’è in lui una parte molto infantile anche molto ingenua dolce affettuosa e di buon cuore che in molti aspetti dei “doveri della vita” non è ancora molto matura.", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },

  "22/02/2026": [
    { nick: "Cucciolo di Riccio ", nome: "Niccolò D'alessandro", anni: "8", tel: "3381248567", note: "Pelle molto chiara- necessita di protezione solare ", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Lupo Frullo", nome: "Matteo Gragnani", anni: "12", tel: "3756238580", note: "In famiglia pratichiamo educazione/istruzione parentale ad indirizzo montessoriano da quando Matteo è nato. Per questo non utilizziamo né premi né punizioni. Ci sono 3 regole in casa che non si discutono: non si può fare male. farsi male e danneggiare (fare male) alle cose (ambiente). Sono tre limiti invalicabili. Per il resto le regole vengono condivise e negoziate con il bambino attraverso il dialogo. Il bambino ha sempre imparato attraverso il fare: l’uso delle mani e del corpo sono centrali nella nostra visione dell’apprendimento. Matteo è un bambino sensibile. Preferisce osservare bene le nuove situazioni prima di aprirsi e dare confidenza.  Abitiamo in campagna - abbiamo un bosco - un oliveto (da recuperare) - 4 gatti 6 galline 1 gallo 1 cane e 1 tartaruga. Cerchiamo di imparare ad avere un nostro orto anche se per anni abbiamo partecipato a progetti di orti condivisi con altre famiglie. A Matteo piace molto leggere e cucinare e ha ideato un suo giornalino dedicato al paese in cui viviamo da una paio di anni: Il Gazzettino Nocchiese. Dallo scorso anno è scoppiata una passione infinita per il tennis. Gli piace l’idea di imparare a conoscere il bosco. Gli piace imparare a riconoscere le piante spontanee e per noi(che amiamo tanto la natura) sarebbe bello dargli l’opportunità di familiarizzare con la biodiversità che caratterizza la Lecciona.Speriamo che la diversa impostazione educativa non sia d’ostacolo. Non pensiamo che sia necessario trattare duramente i bambini per prepararli al fatto che la vita è dura. Ma crediamo che la consapevolezza che può  offrire la natura sia una risorsa davvero preziosa perché dalla natura abbiamo davvero tanto da imparare. Quindi ci apriamo a questa esperienza che valuteremo passo passo anche insieme a voi.", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },

    { nick: "Cavallo Selvaggio", nome: "Filippo Vannucci", anni: "9", tel: "3200543696", note: "ADHD e disturbo coordinazione. Con l'equipe del Tabarracci ci stiamo principalmente occupando di problematiche legate all'autostima -  nel senso che Filippo è capace a fare tutto ma ha ancora bisogno di incoraggiamento e tende a buttarsi giù quando non riesce. ", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },

    { nick: "Lupo Frullo", nome: "Matteo Gragnani", anni: "12", tel: "3756238580", note: "In famiglia pratichiamo educazione/istruzione parentale ad indirizzo montessoriano da quando Matteo è nato. Per questo non utilizziamo né premi né punizioni. Ci sono 3 regole in casa che non si discutono: non si può fare male. farsi male e danneggiare (fare male) alle cose (ambiente). Sono tre limiti invalicabili. Per il resto le regole vengono condivise e negoziate con il bambino attraverso il dialogo. Il bambino ha sempre imparato attraverso il fare: l’uso delle mani e del corpo sono centrali nella nostra visione dell’apprendimento. Matteo è un bambino sensibile. Preferisce osservare bene le nuove situazioni prima di aprirsi e dare confidenza.  Abitiamo in campagna - abbiamo un bosco - un oliveto (da recuperare) - 4 gatti 6 galline 1 gallo 1 cane e 1 tartaruga. Cerchiamo di imparare ad avere un nostro orto anche se per anni abbiamo partecipato a progetti di orti condivisi con altre famiglie. A Matteo piace molto leggere e cucinare e ha ideato un suo giornalino dedicato al paese in cui viviamo da una paio di anni: Il Gazzettino Nocchiese. Dallo scorso anno è scoppiata una passione infinita per il tennis. Gli piace l’idea di imparare a conoscere il bosco. Gli piace imparare a riconoscere le piante spontanee e per noi(che amiamo tanto la natura) sarebbe bello dargli l’opportunità di familiarizzare con la biodiversità che caratterizza la Lecciona.Speriamo che la diversa impostazione educativa non sia d’ostacolo. Non pensiamo che sia necessario trattare duramente i bambini per prepararli al fatto che la vita è dura. Ma crediamo che la consapevolezza che può  offrire la natura sia una risorsa davvero preziosa perché dalla natura abbiamo davvero tanto da imparare. Quindi ci apriamo a questa esperienza che valuteremo passo passo anche insieme a voi.", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },
    { nick: "Prusik", nome: "Matteo Biagi", anni: "12", tel: "3492919896", note: "Matteo e’ un bambino con diagnosi di Dsa (disturbo di apprendimento). durante l’ultimo anno scolastico il bambino e’ stato vittima di percosse ed esclusione da parte di alcuni compagni percui abbiamo intrapreso un percorso psicologico che è tuttora in corso", presente: true, pranzo: false, lecciona: false, versiliana: false, goblins: false },

function renderDay(dateStr) {
  const data = allData[dateStr] || [];
  const countPresente = data.filter(p => p.presente).length;
  const countGoblins = data.filter(p => p.goblins).length;
  const countPranzo = data.filter(p => p.pranzo).length;
  const countLecciona = data.filter(p => p.lecciona && !p.versiliana).length;
  const countVersiliana = data.filter(p => p.versiliana && !p.goblins).length;
  document.getElementById('content').innerHTML = '' +
    '<div class="list-section"><h2>Mattina ('+countPresente+')</h2><ul id="list-presente"></ul></div>' +
    '<div class="list-section"><h2>Rifugio dei Folletti ('+countGoblins+')</h2><ul id="list-goblins"></ul></div>' +
    '<div class="list-section"><h2>Pranzo ('+countPranzo+')</h2><ul id="list-pranzo"></ul></div>' +
    '<div class="list-section"><h2>Pomeriggio Lecciona ('+countLecciona+')</h2><ul id="list-lecciona"></ul></div>' +
    '<div class="list-section"><h2>Pomeriggio Versiliana ('+countVersiliana+')</h2><ul id="list-versiliana"></ul></div>';
  const listPresente = document.getElementById('list-presente');
  const listGoblins = document.getElementById('list-goblins');
  const listPranzo = document.getElementById('list-pranzo');
  const listLecciona = document.getElementById('list-lecciona');
  const listVersiliana = document.getElementById('list-versiliana');
  function createListItem(p) {
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.className = 'name';
    span.textContent = p.nick;
    span.onclick = () => showModal(p);
    li.appendChild(span);
    return li;
  }
  data.forEach(p => {
    if (p.presente) listPresente.appendChild(createListItem(p));
    if (p.goblins) listGoblins.appendChild(createListItem(p));
    if (p.pranzo) listPranzo.appendChild(createListItem(p));
    if (p.lecciona && !p.versiliana) listLecciona.appendChild(createListItem(p));
    if (p.versiliana && !p.goblins) listVersiliana.appendChild(createListItem(p));
  });
}
function getToday(){let t=new Date();return ('0'+t.getDate()).slice(-2)+'/'+('0'+(t.getMonth()+1)).slice(-2)+'/'+t.getFullYear();}
let today=getToday();
renderDay(today);
