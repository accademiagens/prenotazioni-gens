function renderDay(dateStr){
const data = allData[dateStr]||[];
const goblins = allGoblins[dateStr]||[];
const countPresente = data.filter(p=>p.presente).length;
const countGoblins = goblins.length;
const countPranzo = data.filter(p=>p.pranzo).length;
const countLecciona = data.filter(p=>p.lecciona&&!p.versiliana).length;
const countVersiliana = data.filter(p=>p.versiliana).length;
document.getElementById('current-date').textContent=dateStr;
document.getElementById('content').innerHTML=''+
'<div class="list-section"><h2>Mattina ('+countPresente+')</h2><ul id="list-presente"></ul></div>'+
'<div class="list-section"><h2>Rifugio dei Folletti ('+countGoblins+')</h2><ul id="list-goblins"></ul></div>'+
'<div class="list-section"><h2>Pranzo ('+countPranzo+')</h2><ul id="list-pranzo"></ul></div>'+
'<div class="list-section"><h2>Pomeriggio Lecciona ('+countLecciona+')</h2><ul id="list-lecciona"></ul></div>'+
'<div class="list-section"><h2>Pomeriggio Versiliana ('+countVersiliana+')</h2><ul id="list-versiliana"></ul></div>';
const lp=document.getElementById('list-presente');
const lg=document.getElementById('list-goblins');
const lpr=document.getElementById('list-pranzo');
const ll=document.getElementById('list-lecciona');
const lv=document.getElementById('list-versiliana');
function li(p){let el=document.createElement('li');el.textContent=p.nick;return el;}
data.forEach(p=>{
if(p.presente)lp.appendChild(li(p));
if(p.pranzo)lpr.appendChild(li(p));
if(p.lecciona&&!p.versiliana)ll.appendChild(li(p));
if(p.versiliana)lv.appendChild(li(p));
});
goblins.forEach(p=>lg.appendChild(li(p)));
}
function getToday(){let d=new Date();return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();}
function getQueryParam(n){return new URLSearchParams(location.search).get(n);}
let today=getToday();
let shown=getQueryParam('date')||today;
renderDay(shown);
document.getElementById('prev-day').onclick=()=>{
let d=new Date(shown.split('/').reverse().join('-'));
d.setDate(d.getDate()-1);
shown=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
renderDay(shown);};
document.getElementById('next-day').onclick=()=>{
let d=new Date(shown.split('/').reverse().join('-'));
d.setDate(d.getDate()+1);
shown=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
renderDay(shown);};
</script></body></html>
